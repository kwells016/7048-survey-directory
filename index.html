<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7048 Survey Directory - Clock Check</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            color: #2a2a2a;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background-color: #ffffff;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 12px;
            color: #2a2a2a;
        }

        .subtitle {
            font-size: 14px;
            color: #666666;
            margin-bottom: 40px;
        }

        .form-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn {
            padding: 16px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s ease;
            text-align: center;
        }

        .btn-primary {
            background-color: #0053e2;
            color: #ffffff;
        }

        .btn-primary:hover {
            background-color: #003db3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 83, 226, 0.3);
        }

        .btn-primary:active {
            background-color: #003399;
            transform: translateY(0);
        }

        .btn-secondary {
            background-color: #ffffff;
            color: #2a2a2a;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover {
            border-color: #0053e2;
            color: #0053e2;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .hidden {
            display: none;
        }

        .message {
            font-size: 18px;
            line-height: 1.6;
            color: #2a2a2a;
            margin-bottom: 30px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn-group .btn {
            flex: 1;
            max-width: 150px;
        }

        .warning-message {
            font-size: 18px;
            color: #ea1100;
            font-weight: 500;
            margin-top: 20px;
        }

        /* Mobile responsiveness */
        @media (max-width: 600px) {
            .container {
                padding: 30px 16px;
            }

            h1 {
                font-size: 24px;
            }

            .btn {
                padding: 14px 20px;
                font-size: 15px;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn-group .btn {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Landing Page: Clock Status Check -->
        <div id="landingPage">
            <h1>Welcome</h1>
            <p class="message">Are you currently on the clock?</p>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="proceedToSurvey()">Yes</button>
                <button class="btn btn-secondary" onclick="showNotClockedIn()">No</button>
            </div>
        </div>

        <!-- Survey Directory Page -->
        <div id="surveyPage" class="hidden">
            <h1>7048 Survey Directory</h1>
            <p class="subtitle">Access all your forms here</p>

            <div class="form-buttons">
                <a href="https://airtable.com/appHdJSeNijf4l484/pagOtiErMspngniLR/form" class="btn btn-primary" target="_blank" rel="noopener noreferrer">
                    Voice of the Associate
                </a>
                <a href="https://airtable.com/app1eIFBNjwjSfFBU/paglTLJp61QVUkfo3/form" class="btn btn-primary" target="_blank" rel="noopener noreferrer">
                    Profile and Rack Label Request
                </a>
                <a href="https://airtable.com/appxGYKGmm6FOrMgC/pagYsEdFVHMgCpG8W/form" class="btn btn-primary" target="_blank" rel="noopener noreferrer">
                    Transfer Interest
                </a>
            </div>
        </div>

        <!-- Not Clocked In Message -->
        <div id="notClockedInPage" class="hidden">
            <h1>See You Later!</h1>
            <p class="warning-message">Please come back when you are clocked in for the day!</p>
        </div>
    </div>

    <script>
        function proceedToSurvey() {
            document.getElementById('landingPage').classList.add('hidden');
            document.getElementById('surveyPage').classList.remove('hidden');
        }

        function showNotClockedIn() {
            document.getElementById('landingPage').classList.add('hidden');
            document.getElementById('notClockedInPage').classList.remove('hidden');
        }
    </script>
</body>
</html>
